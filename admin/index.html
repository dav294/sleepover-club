<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sleepover Club</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #1a1a1a;
      --surface2:     #242424;
      --border:       #2e2e2e;
      --text:         #f0f0f0;
      --muted:        #888;
      --accent:       #c8a96e;
      --accent-dark:  #a88950;
      --danger:       #e05555;
      --success:      #4caf7d;
      --radius:       10px;
    }

    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── AUTH ── */
    .auth-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .auth-box  { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:44px 40px; width:100%; max-width:460px; }
    .auth-logo { font-size:20px; font-weight:700; color:var(--accent); margin-bottom:6px; }
    .auth-sub  { font-size:13px; color:var(--muted); margin-bottom:32px; }

    /* ── HEADER ── */
    .hdr { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200; }
    .hdr-logo { font-size:15px; font-weight:700; color:var(--accent); cursor:pointer; letter-spacing:-0.3px; }
    .hdr-crumb { font-size:13px; color:var(--muted); display:flex; align-items:center; gap:6px; }
    .hdr-crumb .c { color:var(--text); cursor:pointer; } .hdr-crumb .c:hover { color:var(--accent); }
    .hdr-right { display:flex; gap:10px; }

    /* ── BUTTONS ── */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:8px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; border:none; transition:all .15s; }
    .btn-primary  { background:var(--accent); color:#0d0d0d; }
    .btn-primary:hover  { background:var(--accent-dark); }
    .btn-ghost    { background:transparent; color:var(--muted); border:1px solid var(--border); }
    .btn-ghost:hover    { border-color:var(--accent); color:var(--accent); }
    .btn-danger   { background:transparent; color:var(--danger); border:1px solid var(--border); }
    .btn-danger:hover   { background:rgba(224,85,85,.1); border-color:var(--danger); }
    .btn:disabled { opacity:.45; cursor:not-allowed; }

    /* ── HOME ── */
    .home-wrap { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 57px); padding:40px 24px; }
    .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; max-width:680px; }
    .home-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:60px 40px; text-align:center; cursor:pointer; transition:all .2s; display:flex; flex-direction:column; align-items:center; gap:14px; }
    .home-card:hover { border-color:var(--accent); background:var(--surface2); transform:translateY(-3px); }
    .home-card-icon  { font-size:42px; line-height:1; }
    .home-card-title { font-size:22px; font-weight:700; letter-spacing:-.5px; }
    .home-card-count { font-size:13px; color:var(--muted); }

    /* ── COLLECTION ── */
    .col-wrap   { padding:32px; }
    .col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:26px; }
    .col-title  { font-size:26px; font-weight:700; letter-spacing:-.5px; }
    .col-grid   { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px, 1fr)); gap:14px; }

    .item-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; cursor:pointer; transition:all .15s; }
    .item-card:hover { border-color:var(--accent); background:var(--surface2); }
    .item-card-title { font-size:14px; font-weight:600; line-height:1.3; margin-bottom:6px; }
    .item-card-sub   { font-size:12px; color:var(--muted); }
    .badge { display:inline-block; margin-top:10px; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .badge-up   { background:rgba(200,169,110,.15); color:var(--accent); }
    .badge-past { background:rgba(255,255,255,.06); color:var(--muted); }

    .add-card { background:transparent; border:2px dashed var(--border); border-radius:var(--radius); padding:20px; cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-height:96px; color:var(--muted); }
    .add-card:hover { border-color:var(--accent); color:var(--accent); }
    .add-card-icon { font-size:22px; }
    .add-card-label { font-size:13px; font-weight:600; }

    /* ── EDITOR ── */
    .ed-layout  { display:grid; grid-template-columns:1fr 360px; min-height:calc(100vh - 57px); }
    .ed-form    { padding:32px; border-right:1px solid var(--border); overflow-y:auto; }
    .ed-preview { padding:28px; overflow-y:auto; position:sticky; top:57px; height:calc(100vh - 57px); }

    .ed-form-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .ed-form-title  { font-size:22px; font-weight:700; letter-spacing:-.5px; }
    .ed-actions     { display:flex; gap:10px; }

    .sec { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--accent); margin:28px 0 16px; padding-bottom:8px; border-bottom:1px solid var(--border); }

    .fg  { margin-bottom:18px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; }
    .hint { font-size:11px; color:var(--muted); margin-top:4px; }

    input[type=text], input[type=url], input[type=date], input[type=password], textarea, select {
      width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; font-size:14px; font-family:inherit; color:var(--text); transition:border-color .15s;
    }
    input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); }
    input[readonly] { opacity:.5; cursor:not-allowed; }
    textarea { resize:vertical; min-height:88px; }
    select option { background:var(--surface); }

    /* toggle */
    .toggle-row { display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
    .toggle-row-label { font-size:14px; }
    .tog { position:relative; width:40px; height:22px; flex-shrink:0; }
    .tog input { opacity:0; width:0; height:0; }
    .tog-slider { position:absolute; inset:0; background:var(--border); border-radius:22px; cursor:pointer; transition:.2s; }
    .tog-slider::before { content:''; position:absolute; height:16px; width:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
    .tog input:checked + .tog-slider { background:var(--accent); }
    .tog input:checked + .tog-slider::before { transform:translateX(18px); }

    /* tags */
    .tags-wrap { display:flex; flex-wrap:wrap; gap:6px; padding:8px; background:var(--surface); border:1px solid var(--border); border-radius:8px; min-height:42px; align-items:center; cursor:text; }
    .tags-wrap:focus-within { border-color:var(--accent); }
    .chip { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:12px; display:flex; align-items:center; gap:4px; white-space:nowrap; }
    .chip button { background:none; border:none; color:var(--muted); cursor:pointer; padding:0; font-size:13px; line-height:1; }
    .chip button:hover { color:var(--text); }
    .tag-input { flex:1; min-width:80px; background:none; border:none; color:var(--text); font-size:13px; padding:2px 4px; }
    .tag-input:focus { outline:none; }

    /* image */
    .img-zone { border:2px dashed var(--border); border-radius:8px; padding:24px; text-align:center; cursor:pointer; transition:border-color .15s; }
    .img-zone:hover { border-color:var(--accent); }
    .img-zone p { font-size:12px; color:var(--muted); margin-top:6px; }
    .img-preview { position:relative; display:inline-block; }
    .img-preview img { max-width:100%; max-height:180px; border-radius:8px; display:block; }
    .img-remove { position:absolute; top:6px; right:6px; background:rgba(0,0,0,.7); color:#fff; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; }

    .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(76px, 1fr)); gap:7px; margin-bottom:8px; }
    .gthumb { position:relative; aspect-ratio:1; border-radius:6px; overflow:hidden; background:var(--surface2); }
    .gthumb img { width:100%; height:100%; object-fit:cover; }
    .gthumb .img-remove { width:18px; height:18px; font-size:11px; top:3px; right:3px; }

    /* preview */
    .pv-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:14px; }
    .pv-card  { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .pv-cover { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
    .pv-cover-ph { width:100%; aspect-ratio:16/9; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:13px; }
    .pv-body  { padding:16px; }
    .pv-title { font-size:16px; font-weight:700; margin-bottom:4px; line-height:1.2; }
    .pv-meta  { font-size:12px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .pv-desc  { font-size:13px; color:var(--muted); line-height:1.5; }

    /* toast */
    .toast { position:fixed; bottom:22px; right:22px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:11px 18px; font-size:13px; z-index:9999; transform:translateY(60px); opacity:0; transition:all .25s; pointer-events:none; }
    .toast.show  { transform:translateY(0); opacity:1; }
    .toast.ok    { border-color:var(--success); }
    .toast.err   { border-color:var(--danger); }

    .spinner { display:flex; align-items:center; justify-content:center; padding:80px; color:var(--muted); font-size:14px; }

    @media (max-width:800px) {
      .home-grid { grid-template-columns:1fr; max-width:360px; }
      .ed-layout  { grid-template-columns:1fr; }
      .ed-preview { display:none; }
      .row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const REPO    = 'dav294/sleepover-club';
const BRANCH  = 'main';
const TOK_KEY = 'sc-upload-token';

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let S = {
  route: 'home',      // home | events | artists | edit-event | edit-artist
  editId: null,
  events: [],
  artists: [],
  evSha: null,
  arSha: null,
  busy: false,
};
let _draft = null;    // working copy of item being edited

// ═══════════════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════════════
const tok = () => localStorage.getItem(TOK_KEY);
const hdrs = () => ({ Authorization: 'token ' + tok(), 'Content-Type': 'application/json' });

async function ghRead(path) {
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    headers: { Authorization: 'token ' + tok(), Accept: 'application/vnd.github.v3+json' },
  });
  if (!r.ok) throw new Error('GitHub ' + r.status + ' reading ' + path);
  const j = await r.json();
  const text = decodeURIComponent(escape(atob(j.content.replace(/\n/g, ''))));
  return { data: JSON.parse(text), sha: j.sha };
}

async function ghWrite(path, data, sha, msg) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: msg, content, branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT', headers: hdrs(), body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error('GitHub ' + r.status + ' writing ' + path);
  return (await r.json()).content.sha;
}

async function ghUpload(file) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onerror = rej;
    fr.onload = async e => {
      const b64  = e.target.result.split(',')[1];
      const name = file.name.replace(/[^a-zA-Z0-9._-]/g, '-').toLowerCase();
      const path = 'assets/images/uploads/' + Date.now() + '-' + name;
      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT', headers: hdrs(),
        body: JSON.stringify({ message: 'Upload: ' + file.name, content: b64 }),
      });
      if (!r.ok) throw new Error('Upload failed ' + r.status);
      res(path);
    };
    fr.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════
//  LOAD / SAVE
// ═══════════════════════════════════════════════════
async function loadAll() {
  S.busy = true; render();
  try {
    const [ev, ar] = await Promise.all([ghRead('data/events.json'), ghRead('data/artists.json')]);
    S.events  = ev.data.items || [];
    S.evSha   = ev.sha;
    S.artists = ar.data.items || [];
    S.arSha   = ar.sha;
  } catch(e) { toast('Failed to load: ' + e.message, 'err'); }
  S.busy = false; render();
}

async function saveEvents()  { S.evSha = await ghWrite('data/events.json',  { items: S.events  }, S.evSha, 'CMS: update events');  }
async function saveArtists() { S.arSha = await ghWrite('data/artists.json', { items: S.artists }, S.arSha, 'CMS: update artists'); }

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'ok' ? '✓  ' : '✗  ') + msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = 'toast'; }, 3500);
}

// ═══════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════
function go(route, id = null) { S.route = route; S.editId = id; _draft = null; render(); window.scrollTo(0,0); }

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function slug(s){ return (s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d+'T00:00:00').toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'}); }
  catch { return d; }
}
function blankEvent() {
  return { id:'',title:'',subtitle:'',status:'upcoming',date:'',doorsTime:'',endTime:'',venue:'',
    address:'',city:'',country:'Ireland',ageRestriction:'18+',coverImage:'',poster:'',gallery:[],
    videoEmbed:'',shortDesc:'',fullDesc:'',ticketLink:'',soldOut:false,tags:[],artistIds:[] };
}
function blankArtist() {
  return { id:'',name:'',genre:'',origin:'',bio:'',featured:true,coverImage:'',gallery:[],
    videoEmbed:'', socials:{instagram:'',spotify:'',soundcloud:'',bandcamp:'',youtube:'',tiktok:''},
    shopifyEmbedCode:'',eventIds:[] };
}
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function val(id)  { const el = document.getElementById(id); return el ? el.value : ''; }

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (!tok())     { app.innerHTML = authHTML();                        bindAuth();        return; }
  if (S.busy)     { app.innerHTML = hdr() + '<div class="spinner">Loading…</div>'; bindHdr(); return; }
  switch (S.route) {
    case 'home':        app.innerHTML = hdr() + homeHTML();        bindHdr(); bindHome();        break;
    case 'events':      app.innerHTML = hdr() + eventsHTML();      bindHdr(); bindEvents();      break;
    case 'artists':     app.innerHTML = hdr() + artistsHTML();     bindHdr(); bindArtists();     break;
    case 'edit-event':  app.innerHTML = hdr() + editEventHTML();   bindHdr(); bindEditEvent();   break;
    case 'edit-artist': app.innerHTML = hdr() + editArtistHTML();  bindHdr(); bindEditArtist();  break;
  }
}

// ─── AUTH ───────────────────────────────────────────
function authHTML() { return `
  <div class="auth-wrap"><div class="auth-box">
    <div class="auth-logo">Sleepover Club</div>
    <div class="auth-sub">Admin — content management</div>
    <div class="fg">
      <label>GitHub Personal Access Token</label>
      <input type="password" id="pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div class="hint">Needs <strong>repo</strong> scope. &nbsp;<a href="https://github.com/settings/tokens/new?scopes=repo&description=Sleepover+Club+CMS" target="_blank" style="color:var(--accent)">Generate one ↗</a></div>
    </div>
    <button class="btn btn-primary" id="auth-btn" style="width:100%;justify-content:center;padding:12px 18px">Log in</button>
  </div></div>`; }

function bindAuth() {
  const btn = document.getElementById('auth-btn');
  const input = document.getElementById('pat');
  const go = async () => {
    const v = input.value.trim(); if (!v) return;
    localStorage.setItem(TOK_KEY, v);
    await loadAll();
  };
  btn.onclick = go;
  input.addEventListener('keydown', e => { if (e.key==='Enter') go(); });
}

// ─── HEADER ─────────────────────────────────────────
function hdr() {
  let crumb = '';
  if (S.route === 'events')      crumb = 'Events';
  if (S.route === 'artists')     crumb = 'Artists';
  if (S.route === 'edit-event')  {
    const it = S.editId ? S.events.find(e=>e.id===S.editId) : null;
    crumb = `<span class="c" data-go="events">Events</span> <span>/</span> ${it ? esc(it.title) : 'New Event'}`;
  }
  if (S.route === 'edit-artist') {
    const it = S.editId ? S.artists.find(a=>a.id===S.editId) : null;
    crumb = `<span class="c" data-go="artists">Artists</span> <span>/</span> ${it ? esc(it.name) : 'New Artist'}`;
  }
  return `
  <header class="hdr">
    <div class="hdr-logo" id="h-logo">Sleepover Club</div>
    <div class="hdr-crumb">${crumb}</div>
    <div class="hdr-right">
      ${S.route!=='home' ? `<button class="btn btn-ghost" id="h-back">← Home</button>` : ''}
      <button class="btn btn-ghost" id="h-logout" style="font-size:12px;padding:7px 12px">Log out</button>
    </div>
  </header>`;
}

function bindHdr() {
  document.getElementById('h-logo').onclick = () => go('home');
  const back = document.getElementById('h-back');
  if (back) back.onclick = () => go('home');
  document.getElementById('h-logout').onclick = () => {
    if (confirm('Log out?')) { localStorage.removeItem(TOK_KEY); render(); }
  };
  document.querySelectorAll('.hdr-crumb .c[data-go]').forEach(el => {
    el.onclick = () => go(el.dataset.go);
  });
}

// ─── HOME ────────────────────────────────────────────
function homeHTML() { return `
  <div class="home-wrap"><div class="home-grid">
    <div class="home-card" id="go-events">
      <div class="home-card-icon">🎶</div>
      <div class="home-card-title">Events</div>
      <div class="home-card-count">${S.events.length} event${S.events.length!==1?'s':''}</div>
    </div>
    <div class="home-card" id="go-artists">
      <div class="home-card-icon">🎤</div>
      <div class="home-card-title">Artists</div>
      <div class="home-card-count">${S.artists.length} artist${S.artists.length!==1?'s':''}</div>
    </div>
  </div></div>`; }

function bindHome() {
  document.getElementById('go-events').onclick  = () => go('events');
  document.getElementById('go-artists').onclick = () => go('artists');
}

// ─── EVENTS GRID ────────────────────────────────────
function eventsHTML() {
  const cards = S.events.map(e => `
    <div class="item-card" data-id="${esc(e.id)}">
      <div class="item-card-title">${esc(e.title)||'(Untitled)'}</div>
      <div class="item-card-sub">${fmtDate(e.date)}${e.venue?` · ${esc(e.venue)}`:''}${e.city?`, ${esc(e.city)}`:''}</div>
      <span class="badge badge-${e.status==='upcoming'?'up':'past'}">${e.status||'past'}</span>
    </div>`).join('');
  return `
  <div class="col-wrap">
    <div class="col-header">
      <h1 class="col-title">Events</h1>
      <button class="btn btn-primary" id="new-ev-btn">+ New Event</button>
    </div>
    <div class="col-grid">
      ${cards}
      <div class="add-card" id="add-ev-card"><div class="add-card-icon">+</div><div class="add-card-label">Add Event</div></div>
    </div>
  </div>`; }

function bindEvents() {
  document.querySelectorAll('.item-card[data-id]').forEach(el => { el.onclick = () => go('edit-event', el.dataset.id); });
  document.getElementById('new-ev-btn').onclick   = () => go('edit-event', null);
  document.getElementById('add-ev-card').onclick  = () => go('edit-event', null);
}

// ─── ARTISTS GRID ───────────────────────────────────
function artistsHTML() {
  const cards = S.artists.map(a => `
    <div class="item-card" data-id="${esc(a.id)}">
      <div class="item-card-title">${esc(a.name)||'(Unnamed)'}</div>

// ═══════════════════════════════════════════════════
function imgZone(type, src) {
  if (src) return `<div class="img-preview"><img src="/${esc(src)}" onerror="this.style.opacity='.3'"><button class="img-remove" data-rm-img="${type}">×</button></div>`;
  return `<div class="img-zone" id="iz-${type}"><label for="if-${type}" style="cursor:pointer;display:block"><div style="font-size:22px">🖼️</div><p>Click to upload</p></label></div>`;
}

function galleryHTML(arr) {
  if (!arr || !arr.length) return `<p style="font-size:12px;color:var(--muted)">No photos yet.</p>`;
  return `<div class="gallery-grid">${arr.map((s,i)=>`<div class="gthumb"><img src="/${esc(s)}" onerror="this.style.opacity='.3'"><button class="img-remove" data-rm-gal="${i}">×</button></div>`).join('')}</div>`;
}

function bindImgUpload(type, onDone) {
  const input = document.getElementById('if-' + type);
  const zone  = document.getElementById('iz-' + type);
  if (input) input.onchange = () => { if (input.files[0]) doImgUpload(input.files[0], type, onDone); };
  if (zone) {
    zone.ondragover = e => e.preventDefault();
    zone.ondrop     = e => { e.preventDefault(); if (e.dataTransfer.files[0]) doImgUpload(e.dataTransfer.files[0], type, onDone); };
  }
}

async function doImgUpload(file, type, onDone) {
  toast('Uploading…');
  try { const p = await ghUpload(file); onDone(p); toast('Uploaded'); }
  catch(e) { toast('Upload failed: ' + e.message, 'err'); }
}

function bindGalleryUpload(onDone) {
  const input = document.getElementById('gal-file');
  const zone  = document.getElementById('gal-zone');
  if (input) input.onchange = () => doGalleryUpload(input.files, onDone);
  if (zone) {
    zone.ondragover = e => e.preventDefault();
    zone.ondrop     = e => { e.preventDefault(); doGalleryUpload(e.dataTransfer.files, onDone); };
  }
}

async function doGalleryUpload(files, onDone) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!arr.length) return;
  toast('Uploading ' + arr.length + ' image(s)…');
  for (const f of arr) {
    try { onDone(await ghUpload(f)); }
    catch(e) { toast('Upload failed: ' + e.message, 'err'); }
  }
  toast('Gallery updated');
}

//  TAG INPUT
// ═══════════════════════════════════════════════════
function tagsHTML(arr, prefix) {
  return arr.map((t,i) => `<div class="chip">${esc(t)}<button data-rm="${prefix}-${i}">×</button></div>`).join('');
}

function setupTags(wrapperId, inputId, getArr, setArr, onChange) {
  const wrap  = document.getElementById(wrapperId);
  const input = document.getElementById(inputId);
  if (!wrap || !input) return;

  const add = v => {
    v = v.trim(); if (!v) return;
    const a = getArr(); if (!a.includes(v)) { a.push(v); setArr(a); reRenderChips(); onChange&&onChange(); }
  };
  const reRenderChips = () => {
    wrap.querySelectorAll('.chip').forEach(c => c.remove());
    const chips = document.createRange().createContextualFragment(tagsHTML(getArr(), wrapperId));
    wrap.insertBefore(chips, input);
    wrap.querySelectorAll(`[data-rm^="${wrapperId}-"]`).forEach(btn => {
      btn.onclick = () => {
        const i = parseInt(btn.dataset.rm.split('-').pop());
        const a = getArr(); a.splice(i, 1); setArr(a); reRenderChips(); onChange&&onChange();
      };
    });
  };

  // Bind existing chips
  wrap.querySelectorAll(`[data-rm^="${wrapperId}-"]`).forEach(btn => {
    btn.onclick = () => {
      const i = parseInt(btn.dataset.rm.split('-').pop());
      const a = getArr(); a.splice(i, 1); setArr(a); reRenderChips(); onChange&&onChange();
    };
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); add(input.value); input.value = ''; }
    if (e.key === 'Backspace' && !input.value) {
      const a = getArr(); if (a.length) { a.pop(); setArr(a); reRenderChips(); onChange&&onChange(); }
    }
  });

  wrap.onclick = () => input.focus();
}

function bindEditEvent() {

    it.videoEmbed    = val('f-video');
    it.ticketLink    = val('f-ticket');
    it.soldOut       = document.getElementById('f-soldout')?.checked || false;
  }

  const refreshPreview = () => { collectBasic(); document.getElementById('pv').innerHTML = evPreview(it); };

  ['f-title','f-subtitle','f-date','f-doors','f-end','f-venue','f-city','f-short','f-status'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', refreshPreview);
  });
  document.getElementById('f-status')?.addEventListener('change', refreshPreview);
  document.getElementById('f-soldout')?.addEventListener('change', refreshPreview);

  // Cover
  bindImgUpload('cover', p => { it.coverImage = p; document.getElementById('cover-zone').innerHTML = imgZone('cover', p); bindRmImg(); refreshPreview(); });
  // Poster
  bindImgUpload('poster', p => { it.poster = p; document.getElementById('poster-zone').innerHTML = imgZone('poster', p); bindRmImg(); });
  // Gallery
  bindGalleryUpload(p => { if (!it.gallery) it.gallery=[]; it.gallery.push(p); document.getElementById('gal-zone-thumbs').innerHTML = galleryHTML(it.gallery); bindRmGal(); });

  function bindRmImg() {
    document.querySelectorAll('[data-rm-img]').forEach(btn => {
      btn.onclick = () => {
        const t = btn.dataset.rmImg;
        if (t==='cover')  { it.coverImage=''; document.getElementById('cover-zone').innerHTML  = imgZone('cover','');  bindImgUpload('cover',  p => { it.coverImage=p; document.getElementById('cover-zone').innerHTML  = imgZone('cover',p);  bindRmImg(); refreshPreview(); }); }

      };
    });
  }

  function bindRmGal() {
    document.querySelectorAll('[data-rm-gal]').forEach(btn => {
      btn.onclick = () => { it.gallery.splice(parseInt(btn.dataset.rmGal),1); document.getElementById('gal-zone-thumbs').innerHTML = galleryHTML(it.gallery); bindRmGal(); };

  bindRmImg(); bindRmGal();

  // Tags
  setupTags('tw-tags', 'ti-tags', ()=>it.tags, a=>{it.tags=a;}, refreshPreview);
  setupTags('tw-aids', 'ti-aids', ()=>it.artistIds, a=>{it.artistIds=a;});

  // Save
  document.getElementById('save-btn').onclick = async () => {
    collectBasic();
    if (!it.id) it.id = slug(it.title);
    if (!it.id) { toast('Add a title or ID first', 'err'); return; }
    const btn = document.getElementById('save-btn');

      go('edit-event', it.id);
    } catch(e) { toast('Save failed: ' + e.message, 'err'); btn.disabled=false; btn.textContent='Save & Publish'; }
  };

  // Delete
  document.getElementById('del-btn')?.addEventListener('click', async () => {
    if (!confirm('Delete this event? This cannot be undone.')) return;
    S.events = S.events.filter(e => e.id !== S.editId);
    try { await saveEvents(); toast('Event deleted'); go('events'); }
    catch(e) { toast('Delete failed: ' + e.message, 'err'); }
  });
}

        ${it.date     ? `<span>${fmtDate(it.date)}</span>` : ''}
        ${it.doorsTime? `<span>Doors ${esc(it.doorsTime)}</span>` : ''}
        ${it.venue    ? `<span>${esc(it.venue)}</span>` : ''}
        ${it.city     ? `<span>${esc(it.city)}</span>` : ''}
      </div>
      ${it.shortDesc ? `<div class="pv-desc">${esc(it.shortDesc)}</div>` : ''}
      ${it.ticketLink ? `<a href="${esc(it.ticketLink)}" target="_blank" style="display:inline-block;margin-top:12px;padding:7px 14px;background:var(--accent);color:#000;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none">${it.soldOut?'Sold Out':'Get Tickets'}</a>` : ''}
    </div>
  </div>
  ${(it.tags||[]).length ? `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">${it.tags.map(t=>`<span class="badge badge-past">${esc(t)}</span>`).join('')}</div>` : ''}`; }

function arPreview(it) { return `
  <div class="pv-card">
    ${it.coverImage ? `<img class="pv-cover" src="/${esc(it.coverImage)}" onerror="this.style.opacity='.2'" style="aspect-ratio:1;object-fit:cover">` : `<div class="pv-cover-ph" style="aspect-ratio:1">No cover image</div>`}
    <div class="pv-body">
      <div class="pv-title">${esc(it.name)||'<em style="opacity:.35">Artist name</em>'}</div>
      <div class="pv-meta">
        ${it.genre  ? `<span>${esc(it.genre)}</span>`  : ''}
        ${it.origin ? `<span>${esc(it.origin)}</span>` : ''}
      </div>
      ${it.bio ? `<div class="pv-desc">${esc(it.bio).substring(0,200)}${it.bio.length>200?'…':''}</div>` : ''}
      ${it.featured ? `<span class="badge badge-up" style="display:inline-block;margin-top:10px">Featured</span>` : ''}
    </div>
  </div>`; }

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
if (tok()) { loadAll(); } else { render(); }
</script>
</body>
</html>
